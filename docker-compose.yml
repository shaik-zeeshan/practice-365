services:
  db:
    image: postgres:16
    container_name: practice365-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: practice365
    ports:
      - '5432:5432'
    volumes:
      - practice365_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d practice365']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  practice365_pgdata:
